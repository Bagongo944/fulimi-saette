<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fulmini & Saette – Stagione 2025–26</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f7f5f0;
  color: #1a1a18;
  font-family: 'DM Sans', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.container { text-align: center; max-width: 560px; width: 100%; }
.flag {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #9a9a90;
  margin-bottom: 0.75rem;
}
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(36px, 8vw, 64px);
  font-weight: 900;
  line-height: 0.92;
  letter-spacing: -2px;
  margin-bottom: 0.5rem;
}
.rule {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 1rem 0;
}
.rule::before, .rule::after { content: ''; flex: 1; height: 1px; background: #c8c4ba; }
.sub {
  font-family: 'Playfair Display', Georgia, serif;
  font-style: italic;
  font-size: clamp(14px, 3vw, 18px);
  color: #5a5a55;
  margin-bottom: 2.5rem;
}
.links {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
a.card {
  display: block;
  padding: 1.5rem 1rem;
  border: 1px solid #c8c4ba;
  text-decoration: none;
  color: #1a1a18;
  background: white;
  transition: background 0.15s, color 0.15s;
}
a.card:hover { background: #1a1a18; color: #f7f5f0; }
a.card:hover .card-icon { color: #f7f5f0; }
.card-icon { font-size: 28px; margin-bottom: 0.5rem; display: block; }
.card-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 0.25rem;
}
.card-sub { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #9a9a90; }
a.card:hover .card-sub { color: #c8c4ba; }
.footer { margin-top: 2.5rem; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #9a9a90; }
@media (max-width: 400px) {
  .links { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <div class="flag">Lega Fulmini &amp; Saette</div>
  <h1>LA GAZZETTA<br>DEI FULMINI</h1>
  <div class="rule"><span style="font-size:8px;color:#8a6c2a">◆</span></div>
  <p class="sub">Stagione 2025–26 — Archivio completo</p>

  <div class="links">
    <a href="fulmini_saette_stagione.html" class="card">
      <span class="card-icon">🏆</span>
      <div class="card-title">Campionato</div>
      <div class="card-sub">36 giornate · Classifica finale</div>
    </a>
    <a href="coppa.html" class="card">
      <span class="card-icon">🥊</span>
      <div class="card-title">Ass e' Copp</div>
      <div class="card-sub">Gironi · Quarti · Finale</div>
    </a>
  </div>

  <div class="footer">Fulmini &amp; Saette &nbsp;·&nbsp; 2025–26</div>
</div>
</body>
</html>
